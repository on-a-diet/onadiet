name: Bug report
description: Something isn't working as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough to reproduce it.
        **Security issue? Don't file here** — report it privately (see `SECURITY.md`).
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal command / input / file that triggers it.
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version & install method
      description: The version you're on and how you installed it (npm / Homebrew / from source).
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, and anything else relevant.
    validations:
      required: false
