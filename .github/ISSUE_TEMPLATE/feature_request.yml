name: Feature request
description: Suggest an improvement or a new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough is fine.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've weighed, and why they fall short.
    validations:
      required: false
