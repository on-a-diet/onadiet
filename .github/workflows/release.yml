name: Release

# Automated npm publishing driven by Changesets, authenticated with npm Trusted Publishing (OIDC) —
# there is NO long-lived NPM_TOKEN. Two jobs:
#   • prepare — keeps the "Version Packages" PR current from pending changesets, and decides whether a
#               real publish is due (a public package version is ahead of the registry). Ungated.
#   • publish — runs only when a publish is due, behind the "release" Environment (manual approval), and
#               publishes tokenlessly with a signed provenance attestation, then tags + GitHub Releases.
#
# Prerequisites (one-time, outside this file):
#   1. npmjs.com → each public package → Settings → Trusted Publisher: GitHub Actions, repo
#      on-a-diet/onadiet, workflow `release.yml`. (onadiet, @onadiet/core|pdf|image|svg.)
#   2. GitHub → Settings → Environments → create `release` with yourself as a required reviewer
#      (that required reviewer IS the approval gate; without it, publish would run unpaused).
#
# Actions are pinned to full commit SHAs (supply-chain hardening); the trailing "# vX" comment is the
# human-readable version. Dependabot (github-actions, monthly) bumps both the SHA and the comment.

on:
  push:
    branches: [main]
    # The static site/brand assets never affect a release; don't spin this up for them.
    paths-ignore:
      - 'site/**'
      - 'assets/**'

# Least privilege: nothing at the top level; each job requests only what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight publish

jobs:
  # ── Maintain the Version Packages PR, and decide if a publish is due. ──────────────────────────
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the changeset-release branch
      pull-requests: write # open/update the Version Packages PR
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Opens/updates the Version Packages PR while changesets are pending; a no-op once it is merged.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # A publish is due iff some public package's local version is ahead of the registry — i.e. the
      # Version Packages PR just merged. This gates the publish job so the approval prompt fires on real
      # releases only, not on every feature merge (which merely refreshes the PR above).
      - id: check
        shell: bash
        run: |
          should=false
          for f in packages/*/package.json; do
            [ "$(node -p "require('./$f').private === true")" = "true" ] && continue
            name=$(node -p "require('./$f').name")
            local=$(node -p "require('./$f').version")
            reg=$(npm view "$name" version 2>/dev/null || echo none)
            if [ "$local" != "$reg" ]; then
              echo "→ $name: local $local vs registry $reg — will publish"
              should=true
            else
              echo "  $name: $local already on the registry"
            fi
          done
          echo "should_publish=$should" >> "$GITHUB_OUTPUT"

  # ── Publish (gated). Tokenless via OIDC; provenance-signed. ────────────────────────────────────
  publish:
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: release # manual-approval gate (required reviewer on the environment)
    permissions:
      contents: write # changesets/action pushes git tags + creates GitHub Releases
      id-token: write # OIDC for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Trusted Publishing (OIDC) requires npm ≥ 11.5.1; the runner's bundled npm is older.
      - run: npm install -g npm@latest
      # `pnpm run release` = turbo build + `changeset publish`. changeset publish only publishes packages
      # whose version isn't on the registry yet; npm authenticates via the OIDC token (no NPM_TOKEN) and
      # NPM_CONFIG_PROVENANCE=true attaches a signed provenance attestation. The action then pushes tags
      # and opens a GitHub Release per published package.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
