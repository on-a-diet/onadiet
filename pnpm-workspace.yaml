packages:
  - 'packages/*'

# Single source of truth for shared tooling versions — every package.json references these as
# "catalog:". Bump here once; pnpm applies it everywhere.
#
# TypeScript is deliberately HELD at ~6.0: typescript-eslint 8.64 peers `typescript >=4.8.4 <6.1.0`, so
# TS 7 breaks the type-aware lint stack. Taking TS 7 needs a coordinated typescript-eslint major bump —
# do that as its own change, not a routine dependency bump.
catalog:
  typescript: ~6.0.3
  tsup: ^8.5.1
  vite: ^8.1.3
  vitest: ^4.1.10
  '@types/node': ^26.1.1
  eslint: ^10.7.0
  '@eslint/js': ^10.0.1
  typescript-eslint: ^8.64.0
  prettier: ^3.9.5
  dependency-cruiser: ^18.1.0
  turbo: ^2.10.5
  '@changesets/cli': ^2.31.0
  husky: ^9.1.7
  lint-staged: ^17.0.8
